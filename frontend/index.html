<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>marius_fanny</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Patch fetch BEFORE any module loads — injects bearer token for auth
      (function() {
        var _f = window.fetch.bind(window);
        window.fetch = function(input, init) {
          var url = typeof input === 'string' ? input : (input && input.url) || '';
          if (url.indexOf('vercel.app') !== -1) {
            var t = localStorage.getItem('bearer_token');
            if (t) {
              var h = new Headers(init && init.headers);
              if (!h.has('Authorization')) h.set('Authorization', 'Bearer ' + t);
              init = Object.assign({}, init, { headers: h });
            }
          }
          return _f(input, init);
        };
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
