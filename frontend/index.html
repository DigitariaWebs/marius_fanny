<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>marius_fanny</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Patch fetch BEFORE any module loads:
      //   1. Inject bearer token for backend (vercel.app) requests.
      //   2. Auto-retry transient network errors (Vercel cold starts /
      //      brief deploy gaps) so the UI doesn't show CORS-like
      //      errors while the function spins up.
      (function() {
        var _f = window.fetch.bind(window);
        var sleep = function(ms) { return new Promise(function(r) { setTimeout(r, ms); }); };

        window.fetch = function(input, init) {
          var url = typeof input === 'string' ? input : (input && input.url) || '';
          var isBackend = url.indexOf('vercel.app') !== -1;

          if (isBackend) {
            var t = localStorage.getItem('bearer_token');
            if (t) {
              var h = new Headers(init && init.headers);
              if (!h.has('Authorization')) h.set('Authorization', 'Bearer ' + t);
              init = Object.assign({}, init, { headers: h });
            }
          }

          // Network-error retry (TypeError: Failed to fetch). Only retries
          // backend calls; only retries when no response was received at all
          // — once the server returns a status code we don't second-guess it.
          if (!isBackend) return _f(input, init);

          var attempt = 0;
          // Cover Vercel cold starts (30s) + a couple of follow-ups.
          var delays = [500, 1500, 3000, 5000, 8000, 12000];
          var run = function() {
            return _f(input, init).catch(function(err) {
              var transient = err && err.name === 'TypeError';
              if (transient && attempt < delays.length) {
                var d = delays[attempt++];
                return sleep(d).then(run);
              }
              throw err;
            });
          };
          return run();
        };
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
